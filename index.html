<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=image_search" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=air" />

<body>

    <main class="main-container">
        <header class="input">
            <input class="input-city" placeholder="Enter city name"/>
            <button class="search-btn">
                <span class="material-symbols-outlined">
                     image_search

            </button>

        </header>


        <section class="weather-info" style="display: none;">

                <div class="location">
                    <i class="ri-map-pin-line icon"></i>
                    <h4 class="country-txt">lama</h4>
                </div>
          
                <h5 class="current-data">
                    Wed,07 Aug
                </h5>

              

            </div>

            <div class="weather-summary">
                <img src="weather/sun.png" class="weather-summary-img"/>

                    <h3 class="condotion-txt">Clouds</h3>
                </div>
            </div>

            <div class="w">

            <div class="weather-summary-container">
                <div class="condotion-item">
                    <i class="ri-contrast-drop-2-line icon"></i>
                    <h5 class="regular-txt">Humidity</h5>

                </div>

                
            </div>

               <div class="weather-summary-container">
                <div class="condotion-item">
                    <i class="ri-contrast-drop-2-line icon"></i>
                    <h5 class="regular-txt">Wind Speed</h5>
                    <h5 class="wind-value">2 m/s</h5>
                </div>

                </div>
            </div>
            
                <div class="forecast-items-container">
                    <div class="forecast-items">
                        <h5 class="forecast-items-data">05 Aug</h5>
                        <img src="assets/weather/storm.png" class="forecast-items-img" />

                    </div>
                    
                      <div class="forecast-items">
                        <h5 class="forecast-items-data">05 Aug</h5>
                        <img src="assets/weather/storm.png" class="forecast-items-img"/>
                        <h5 class="forecast-items-temp">29 °C</h5>

                    </div>

                      <div class="forecast-items">
                        <h5 class="forecast-items-data">05 Aug</h5>
                        <img src="assets/weather/storm.png" class="forecast-items-img"/>
                        <h5 class="forecast-items-temp">29 °C</h5>

                    </div>

                      <div class="forecast-items">
                        <h5 class="forecast-items-data">05 Aug</h5>
                        <img src="assets/weather/storm.png" class="forecast-items-img"/>
                        <h5 class="forecast-items-temp">29 °C</h5>

                    </div>
                </div>

                

        </section>

        <section class="search-city">
            <h1 class="search-city-text">Search City</h1>
            <div class="message-img-container">
                <img class="message-img" src="assets/message/search.jpg" />
            </div>
            
                    
                </section>

                <section class="not-found" style="display: none;">
                    <div class="not-img-container">
                         <img class="not-found-jmg" src="assets/message/not-found.png"/>

                    </div>
                   
                </section>
    </main>
    <script src="script.js"></script>

</html>
